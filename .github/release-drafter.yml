---
categories:
- labels:
  - feature
  - enhancement
  title: 🚀 Features
- labels:
  - fix
  - bugfix
  - bug
  title: 🐛 Bug Fixes
- label: chore
  title: 🧰 Maintenance
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: \<*_&
name-template: v$RESOLVED_VERSION 🌈
tag-template: v$RESOLVED_VERSION
template: '## Rifle, Rifle, Rifle!


  $CHANGES

  '
version-resolver:
  default: patch
  major:
    labels:
    - major
  minor:
    labels:
    - minor
  patch:
    labels:
    - patch
